name: Build and deploy the presentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs for the same ref
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  Build-And-Deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Build
        run: pnpm install && pnpm build

      # Requires Pages to be enabled once: Settings -> Pages -> Source: GitHub Actions
      # (or: gh api --method POST repos/<owner>/<repo>/pages -f build_type=workflow).
      # Without it, this step fails with "Get Pages site failed ... Not Found".
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

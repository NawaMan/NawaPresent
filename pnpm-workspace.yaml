allowBuilds:
  esbuild: set this to true or false
  svelte-preprocess: set this to true or false
# The CodingBooth base image ships a hardened pnpm that treats "ignored build
# scripts" as a FATAL error (ERR_PNPM_IGNORED_BUILDS, exit 1) and does not honor
# onlyBuiltDependencies / allowBuilds for approval. Our deps esbuild and
# svelte-preprocess carry postinstall scripts that pnpm blocks by default.
#
# strictDepBuilds: false downgrades that fatal error back to a warning, so both
# the build-time `pnpm install` and the runtime verify-deps-before-run check
# (triggered by `pnpm run` / `pnpm exec`) succeed. The scripts still do NOT run,
# which keeps the base image's supply-chain hardening intact. esbuild works fine
# without its postinstall (its platform binary comes via an optionalDependency).
strictDepBuilds: false
